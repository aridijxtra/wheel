<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: sans-serif; background: #000; }
#app { max-width: 520px; margin: 0 auto; padding: 1rem 0.5rem 2rem; }
h1 { font-size: 20px; font-weight: 700; text-align: center; margin: 0 0 4px; color: #f0f0f0; letter-spacing: 1px; }
.wsub { font-size: 12px; color: #999; text-align: center; margin: 0 0 10px; }
#fate-text {
  text-align: center; font-size: 16px; font-weight: 600;
  min-height: 58px; margin-bottom: 12px; line-height: 1.5;
  padding: 10px 16px; border-radius: 10px;
  border: 2px solid transparent;
  background: #1a1a1a; color: #888; transition: all .4s;
}
#fate-text.smoking { background: #3a0a0a; color: #ffb3b3; border-color: #c03030; }
#fate-text.other   { background: #0a2a14; color: #a0ffb8; border-color: #2a9a55; }
.wheel-outer {
  position: relative;
  width: 420px; height: 420px;
  margin: 0 auto;
}
#wheel-img {
  width: 420px; height: 420px;
  border-radius: 50%;
  display: block;
}
#pointer {
  position: absolute;
  top: -20px; left: 50%;
  transform: translateX(-50%);
  width: 0; height: 0;
  border-left: 15px solid transparent;
  border-right: 15px solid transparent;
  border-top: 38px solid #ffffff;
  filter: drop-shadow(0 0 8px rgba(255,80,80,1));
  z-index: 20;
}
#spin-btn {
  display: block; margin: 18px auto 0; padding: 11px 40px;
  font-size: 16px; font-weight: 700; letter-spacing: 1px;
  background: #e24b4a; color: #fff;
  border: none; border-radius: 8px; cursor: pointer;
  text-transform: uppercase; transition: background .15s, transform .1s;
}
#spin-btn:hover { background: #c03030; }
#spin-btn:active { transform: scale(0.97); }
#spin-btn:disabled { background: #555; cursor: not-allowed; }
.wspin-count { text-align: center; font-size: 12px; color: #666; margin-top: 10px; }
#quit-btn {
  display: none; margin: 12px auto 0; padding: 9px 26px; font-size: 14px;
  font-weight: 600; border: 2px solid #2a9a55; color: #2a9a55;
  background: transparent; border-radius: 8px; cursor: pointer;
}
#quit-btn:hover { background: #0a2a14; color: #a0ffb8; }
</style></head><body>

const segments = [
  { label:"Heart disease",  pct:17,  smoking:true,  audio:"audx1"  },
  { label:"Lung cancer",    pct:13,  smoking:true,  audio:"audx2"  },
  { label:"COPD",           pct:8,   smoking:true,  audio:"audx3"  },
  { label:"Vascular dis.",  pct:5,   smoking:true,  audio:"audx4"  },
  { label:"Other cancer",   pct:4,   smoking:true,  audio:"audx5"  },
  { label:"Diabetes",       pct:1.5, smoking:true,  audio:"audx6"  },
  { label:"Infections",     pct:1.5, smoking:true,  audio:"audx7"  },
  { label:"Heart disease",  pct:14,  smoking:false, audio:"audx8"  },
  { label:"Other cancer",   pct:11,  smoking:false, audio:"audx9"  },
  { label:"Vascular dis.",  pct:8,   smoking:false, audio:"audx10" },
  { label:"COPD",           pct:7,   smoking:false, audio:"audx11" },
  { label:"Lung cancer",    pct:4,   smoking:false, audio:"audx12" },
  { label:"Infections",     pct:3,   smoking:false, audio:"audx13" },
  { label:"Diabetes",       pct:3,   smoking:false, audio:"audx14" },
];

const total = segments.reduce((s,d) => s + d.pct, 0);
let currentDeg = 0;
let spinning = false;
let spinCount = 0;
let currentAudio = null;

const audioObjs = {};
for (const [k, v] of Object.entries(AUDIOS)) {
  const a = new Audio(v);
  a.preload = "auto";
  audioObjs[k] = a;
}

function playAudio(key) {
  if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
  const a = audioObjs[key];
  if (a) { a.currentTime = 0; a.play().catch(()=>{}); currentAudio = a; }
}

function getSegmentAtPointer(deg) {
  let pos = ((-deg) % 360 + 360) % 360;
  let cum = 0;
  for (const seg of segments) {
    const sweep = (seg.pct / total) * 360;
    if (pos < cum + sweep) return seg;
    cum += sweep;
  }
  return segments[0];
}

function showResult(seg) {
  const ft = document.getElementById("fate-text");
  const causedStr = seg.smoking ? "caused by smoking 🚬" : "NOT caused by smoking 🌿";
  ft.textContent = "You will probably die from " + seg.label + ", " + causedStr + ".";
  ft.className = seg.smoking ? "smoking" : "other";
  spinCount++;
  document.getElementById("spin-count").textContent =
    "Spun " + spinCount + " time" + (spinCount !== 1 ? "s" : "") + ". Each spin is a life.";
  if (spinCount >= 3) document.getElementById("quit-btn").style.display = "block";
  playAudio(seg.audio);
}

function spin() {
  if (spinning) return;
  spinning = true;
  document.getElementById("spin-btn").disabled = true;
  const ft = document.getElementById("fate-text");
  ft.className = "";
  ft.textContent = "Spinning…";
  const extraDeg = 360 * (8 + Math.random() * 7);
  const duration = 3800 + Math.random() * 1000;
  const start = performance.now();
  const startDeg = currentDeg;

  function easeOut(t) { return 1 - Math.pow(1 - t, 3.5); }

  function frame(now) {
    const t = Math.min((now - start) / duration, 1);
    currentDeg = startDeg + extraDeg * easeOut(t);
    document.getElementById("wheel-img").style.transform = "rotate(" + currentDeg + "deg)";
    if (t < 1) {
      requestAnimationFrame(frame);
    } else {
      currentDeg = startDeg + extraDeg;
      spinning = false;
      document.getElementById("spin-btn").disabled = false;
      showResult(getSegmentAtPointer(currentDeg));
    }
  }
  requestAnimationFrame(frame);
}
</script>
